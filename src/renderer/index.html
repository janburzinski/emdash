<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emdash</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('emdash-theme');
          var pref = raw ? JSON.parse(raw) : null;
          var effective =
            pref === 'emlight' || pref === 'emdark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'emdark'
                : 'emlight';
          document.documentElement.classList.add(effective);
        } catch (_) {}
        try {
          var aaRaw = localStorage.getItem('emdash-antialiasing');
          var aa = aaRaw === null ? true : JSON.parse(aaRaw);
          if (aa) document.documentElement.classList.add('antialiased');
        } catch (_) {
          document.documentElement.classList.add('antialiased');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
